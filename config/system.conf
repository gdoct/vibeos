# VibeOS system configuration (/config/system.conf)
# Format: key: value   (# comments, blank lines ignored, dotted keys group)

hostname:   vibebox
domainname: local
motd:       Welcome to VibeOS — configured from /config

# logging
log.level:  info

# networking (informational for now; the stack uses static SLIRP addressing)
net.ip:      10.0.2.15
net.gateway: 10.0.2.2

# init
init.respawn_shell: true
